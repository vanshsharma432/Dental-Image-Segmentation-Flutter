name: Deploy to GitHub Pages

on:
  # Trigger the workflow on push to the main branch
  push:
    branches: [ main ] 

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        # 1. Map the secret to a safe env variable to prevent '$' from breaking the bash script
        env:
          SAFE_API_KEY: ${{ secrets.API_KEY }}
        
        # 2. Build the web app, injecting the base href and the safe environment variable
        # IMPORTANT: Replace YOUR_REPO_NAME with your actual repository name!
        run: |
          flutter build web \
            --base-href "/Dental-Image-Segmentation-Flutter/" \
            --dart-define=API_KEY="$SAFE_API_KEY"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
